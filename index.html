<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layers of İzmir: A Structural and Historical Guide</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        background: '#fdfdfd',
                        foreground: '#111111',
                        muted: '#666666',
                        border: '#e5e5e5',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.foreground');
            transition: background-color 0.3s, color 0.3s;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0a0a;
                color: #f0f0f0;
            }
            .border-border {
                border-color: #333333;
            }
            .text-muted {
                color: #a3a3a3;
            }
            .bg-muted\/10 {
                background-color: rgba(163, 163, 163, 0.1);
            }
        }
        
        /* Utility classes for hiding/showing views */
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-foreground selection:text-background">

    <!-- Header -->
    <header class="py-8 mb-12 border-b border-border">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <button onclick="navigate('home')" class="text-xl font-bold tracking-tight uppercase group cursor-pointer bg-transparent border-none p-0 text-foreground">
                Layers of <span class="text-muted group-hover:text-foreground transition-colors duration-300">İzmir</span>
            </button>
            <nav class="hidden sm:flex gap-6 text-sm font-medium">
                <button onclick="navigate('archaeological')" class="hover:text-muted transition-colors bg-transparent border-none p-0 cursor-pointer text-foreground">Archaeological</button>
                <button onclick="navigate('modern')" class="hover:text-muted transition-colors bg-transparent border-none p-0 cursor-pointer text-foreground">Modern</button>
                <button onclick="navigate('historical')" class="hover:text-muted transition-colors bg-transparent border-none p-0 cursor-pointer text-foreground">Historical</button>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 container mx-auto px-4 sm:px-6 lg:px-8 pb-24 flex flex-col" id="app-container">
        <!-- Content will be injected here by JS -->
    </main>

    <!-- Data and Logic -->
    <script>
        const categoriesData = [
            {
                id: "archaeological",
                name: "Archaeological",
                visual_cue: "Classic column structures (e.g., Smyrna Agora)",
                image_url: "https://images.unsplash.com/photo-1503152394-c571994fd383?q=80&w=800&auto=format",
                items: [
                    {
                        id: "arch-01",
                        title: "Smyrna Agora",
                        location: "Namazgah, Konak",
                        era: "Hellenistic & Roman Period",
                        image_placeholder: "https://images.unsplash.com/photo-1548661710-7f540c9c56d6?q=80&w=1600&auto=format",
                        description: "The administrative and commercial heart of ancient Smyrna. Its well-preserved basilicas, stoas, and monumental arches reveal the strict grid planning and grand scale of Roman civic architecture."
                    },
                    {
                        id: "arch-02",
                        title: "Ephesus Library of Celsus",
                        location: "Selçuk",
                        era: "Roman Period (110s AD)",
                        image_placeholder: "https://upload.wikimedia.org/wikipedia/commons/8/84/Ephesus_Celsus_Library_Fa%C3%A7ade.jpg",
                        description: "A masterpiece of Roman architecture, featuring an intricate facade with double columns and niches. It demonstrates the sophisticated structural engineering and aesthetic refinement of the era."
                    }
                ]
            },
            {
                id: "modern",
                name: "Brutalist & Modern Architecture",
                visual_cue: "Raw concrete and geometric forms (e.g., Kültürpark Pavilions)",
                image_url: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?q=80&w=800&auto=format",
                items: [
                    {
                        id: "mod-01",
                        title: "Kültürpark Pavilion Structures",
                        location: "Alsancak, Konak",
                        era: "1930s - 1950s",
                        image_placeholder: "https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1600&auto=format",
                        description: "Functional geometry and wide spans. These pavilions strip away ornamentation, leaving behind the pure, brutalist concrete surfaces that defined the rationalism of early republican architecture."
                    },
                    {
                        id: "mod-02",
                        title: "Central Bank of İzmir",
                        location: "Pasaport",
                        era: "1970s",
                        image_placeholder: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1600&auto=format",
                        description: "A radical monumental block rising in the city center. Its exposed concrete texture and rhythmic vertical panels create a massive interplay of light and shadow."
                    }
                ]
            },
            {
                id: "historical",
                name: "Historical Places",
                visual_cue: "Stone masonry and Levantine textures (e.g., Kemeraltı)",
                image_url: "https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?q=80&w=800&auto=format",
                items: [
                    {
                        id: "hist-01",
                        title: "Kemeraltı Bazaar",
                        location: "Konak",
                        era: "17th Century onwards",
                        image_placeholder: "https://images.unsplash.com/photo-1549468057-5b7fa1a41d7a?q=80&w=1600&auto=format",
                        description: "A dense, labyrinthine commercial center shaped by centuries of trade. The organic urban layout features historic caravanserais, courtyards, and narrow streets that prioritize human-scale spatial experience."
                    },
                    {
                        id: "hist-02",
                        title: "Kızlarağası Hanı",
                        location: "Kemeraltı, Konak",
                        era: "1744",
                        image_placeholder: "https://images.unsplash.com/photo-1585068205423-889ce32551ec?q=80&w=1600&auto=format",
                        description: "A quintessential Ottoman urban caravanserai. Built with solid stone masonry, its rational courtyard plan provided both secure commercial storage and a serene inner spatial refuge from the bustling bazaar."
                    }
                ]
            }
        ];

        const container = document.getElementById('app-container');

        function renderHome() {
            let cardsHtml = categoriesData.map(cat => `
                <div class="h-full">
                    <button onclick="navigate('${cat.id}')" class="w-full text-left group block p-6 border border-border hover:border-foreground transition-all duration-300 h-full flex flex-col bg-transparent cursor-pointer text-foreground">
                        <h3 class="text-lg font-bold mb-4 uppercase tracking-widest">${cat.name}</h3>
                        <div class="aspect-[16/10] w-full bg-muted/10 border border-border overflow-hidden mb-6">
                            <img src="${cat.image_url}" alt="${cat.name}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500">
                        </div>
                        <p class="text-muted text-sm mt-auto group-hover:text-foreground transition-colors duration-300">
                            ${cat.visual_cue}
                        </p>
                    </button>
                </div>
            `).join('');

            container.innerHTML = `
                <section class="mb-16 md:mb-24 max-w-2xl">
                    <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-6 uppercase">
                        Architectural Anatomy
                    </h1>
                    <p class="text-xl text-muted leading-relaxed">
                        A curated structural and historical guide to the city. Explore the spatial layers that define the urban fabric, stripped of decorative rhetoric.
                    </p>
                </section>
                <section class="grid grid-cols-1 md:grid-cols-3 gap-8 flex-1">
                    ${cardsHtml}
                </section>
            `;
        }

        function renderCategory(categoryId) {
            const category = categoriesData.find(c => c.id === categoryId);
            if (!category) return renderHome();

            let itemsHtml = category.items.map(item => `
                <article class="mb-24 last:mb-0 border-t border-border pt-12 first:border-0 first:pt-0">
                    <div class="aspect-[16/9] bg-muted/10 border border-border flex items-center justify-center mb-8 overflow-hidden">
                        <img src="${item.image_placeholder}" alt="${item.title}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div class="md:col-span-3">
                            <h2 class="text-3xl font-bold tracking-tight mb-2 uppercase">${item.title}</h2>
                            <div class="flex items-center gap-3 text-sm text-muted font-medium mb-6 uppercase tracking-wider">
                                <span>${item.location}</span>
                                <span class="w-1 h-1 bg-muted rounded-full"></span>
                                <span>${item.era}</span>
                            </div>
                            <p class="text-lg leading-relaxed max-w-3xl">
                                ${item.description}
                            </p>
                        </div>
                    </div>
                </article>
            `).join('');

            container.innerHTML = `
                <header class="mb-16 md:mb-24 border-b border-border pb-8">
                    <h1 class="text-4xl md:text-5xl font-bold tracking-tight uppercase">
                        ${category.name}
                    </h1>
                </header>
                <div class="flex flex-col">
                    ${itemsHtml}
                </div>
            `;
        }

        function navigate(view) {
            window.scrollTo(0, 0);
            if (view === 'home') {
                renderHome();
            } else {
                renderCategory(view);
            }
        }

        // Initialize App
        renderHome();
    </script>
</body>
</html>
